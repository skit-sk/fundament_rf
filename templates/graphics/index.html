<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Графики — реальные данные</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; padding: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .summary { margin: 1rem 0; padding: 0.75rem; border: 1px solid #e5e5e5; border-radius: 6px; background: #f9fbff; }
    .summary span { font-weight: bold; }
    .error { color: #c00; margin: 1rem 0; }
    .chart-section { margin-top: 1.5rem; }
    canvas { border: 1px solid #eee; border-radius: 6px; background: #fff; }
    #chartSummary { margin-top: 0.5rem; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Графики — Отклонение цены от входа</h1>

  <div class="summary">
    <p>Загрузка данных с Bitget...</p>
  </div>

  <div id="error" class="error" style="display:none;"></div>

  <div class="chart-section" id="chartSection" style="display:none;">
    <canvas id="chart" width="700" height="350"></canvas>
    <div id="chartSummary"></div>
  </div>

  <script>
    const OBJ_ID = '55779e67-da3e-4c10-9738-56abd866ce31';
    const API_URL = '/graphics/chart/' + OBJ_ID;

    function drawChart(ctx, data) {
      const W = ctx.canvas.width, H = ctx.canvas.height;
      const pad = { l: 60, r: 20, t: 20, b: 40 };
      const w = W - pad.l - pad.r;
      const h = H - pad.t - pad.b;

      ctx.clearRect(0, 0, W, H);

      const ys = data.map(d => d.deviation_percent);
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);
      const rangeY = maxY - minY || 1;
      const yZero = pad.t + h * (maxY / rangeY);

      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pad.l, yZero); ctx.lineTo(pad.l + w, yZero);
      ctx.stroke();

      const steps = 5;
      for (let i = 0; i <= steps; i++) {
        const pct = minY + (rangeY / steps) * i;
        const y = pad.t + h - (i / steps) * h;
        ctx.strokeStyle = '#eee';
        ctx.beginPath();
        ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + w, y);
        ctx.stroke();
        ctx.fillStyle = '#666';
        ctx.font = '11px sans-serif';
        ctx.fillText(pct.toFixed(2) + '%', 2, y + 3);
      }

      ctx.setLineDash([4, 3]);
      ctx.strokeStyle = '#9333ea';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(pad.l, yZero); ctx.lineTo(pad.l + w, yZero);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#9333ea';
      ctx.font = '10px sans-serif';
      ctx.fillText('Entry: 0%', pad.l + 4, yZero - 4);

      ctx.strokeStyle = '#999';
      ctx.lineWidth = 1;
      data.forEach((d, i) => {
        const x = pad.l + (i / (data.length - 1 || 1)) * w;
        const y = pad.t + h - ((d.deviation_percent - minY) / rangeY) * h;
        if (i === 0) { ctx.beginPath(); ctx.moveTo(x, y); }
        else { ctx.beginPath(); ctx.moveTo(pad.l + ((i-1)/(data.length-1||1))*w, pad.t + h - ((data[i-1].deviation_percent - minY) / rangeY) * h); ctx.lineTo(x, y); ctx.stroke(); }
        ctx.fillStyle = d.profitable ? '#16a34a' : '#dc2626';
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.fillStyle = '#666';
      ctx.font = '11px sans-serif';
      data.forEach((d, i) => {
        if (data.length <= 20 || i % Math.ceil(data.length / 15) === 0) {
          const x = pad.l + (i / (data.length - 1 || 1)) * w;
          ctx.save();
          ctx.translate(x, pad.t + h + 14);
          ctx.rotate(-Math.PI / 6);
          ctx.fillText(d.date, 0, 0);
          ctx.restore();
        }
      });
    }

    async function load() {
      try {
        const res = await fetch(API_URL);
        const json = await res.json();
        if (json.error) { document.getElementById('error').textContent = json.error; document.getElementById('error').style.display = 'block'; return; }

        const s = json.summary;
        document.querySelector('.summary').innerHTML = '<p><span>Symbol:</span> ' + s.symbol + ' &nbsp;|&nbsp; <span>Entry:</span> ' + s.entry_price + ' (' + s.entry_date + ') &nbsp;|&nbsp; <span>Current:</span> ' + s.current_price + ' &nbsp;|&nbsp; <span>Deviation:</span> <span style="color:' + (s.profitable ? '#16a34a' : '#dc2626') + ';">' + (s.deviation_usdt >= 0 ? '+' : '') + s.total_deviation_usdt + ' USDT (' + (s.total_deviation_percent >= 0 ? '+' : '') + s.total_deviation_percent + '%)</span></p>';

        document.getElementById('chartSection').style.display = 'block';
        const ctx = document.getElementById('chart').getContext('2d');
        drawChart(ctx, json.chart);

        const first = json.chart[0], last = json.chart[json.chart.length - 1];
        document.getElementById('chartSummary').innerHTML = 'Данные: ' + first.date + ' → ' + last.date + ' | Точек: ' + json.chart.length + ' | Mx: +' + json.summary.max_usdt + ' USDT (+' + json.summary.max_pct + '%) | Mn: ' + json.summary.min_usdt + ' USDT (' + json.summary.min_pct + '%)';
      } catch(e) {
        document.getElementById('error').textContent = 'Ошибка загрузки: ' + e.message;
        document.getElementById('error').style.display = 'block';
      }
    }
    load();
  </script>
</body>
</html>
